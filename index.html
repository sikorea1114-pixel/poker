<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>프리플랍 프로 (샘플) — 텍사스 홀덤 토너먼트 전략 차트</title>
<meta name="description" content="텍사스 홀덤 토너먼트 프리플랍 전략을 위한 169핸드 차트 분석 도구 (샘플 데이터, GTO 솔버 결과 아님)">
<style>
/* ==================================================================
   프리플랍 프로 (샘플) - 스타일시트
   분석 도구 톤: 어두운 슬레이트 배경 + 인디고 accent + 모노스페이스 데이터
   ================================================================== */
:root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --surface-2: #EEF0F3;
  --border: #E1E4EA;
  --text: #14171F;
  --text-2: #5B6472;
  --accent: #5457E5;
  --accent-text: #FFFFFF;

  --act-fold: #94A3B8;
  --act-limp: #06B6D4;
  --act-call: #3B82F6;
  --act-raise: #16A34A;
  --act-3bet: #F59E0B;
  --act-4bet: #A855F7;
  --act-allin: #DC2626;
  --act-callallin: #DB2777;
  --act-check: #64748B;

  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}
[data-theme="dark"] {
  --bg: #10131A;
  --surface: #181C25;
  --surface-2: #1F2430;
  --border: #2A2F3B;
  --text: #ECEEF2;
  --text-2: #8B93A3;
  --accent: #7B7FFF;
  --accent-text: #10131A;

  --act-fold: #6B7686;
  --act-raise: #22C55E;
  --act-allin: #EF4444;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(64px + env(safe-area-inset-bottom));
  transition: background .15s ease, color .15s ease;
}
h1, h2, h3 { font-weight: 700; }
button, select, input, textarea { font-family: inherit; }

button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

/* ---------- 상단바 ---------- */
#topbar {
  position: sticky; top: 0; z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  padding-top: calc(10px + env(safe-area-inset-top));
}
#topbar-title { font-weight: 700; font-size: 15px; white-space: nowrap; }
#situation-strip {
  flex: 1; font-family: var(--font-mono); font-size: 11.5px; color: var(--text-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  background: var(--surface-2); border-radius: 6px; padding: 7px 10px;
}
#situation-strip::before { content: '$ '; opacity: .5; }
#darkmode-toggle {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  width: 36px; height: 36px; font-size: 15px; cursor: pointer; color: var(--text);
  flex-shrink: 0;
}

#main-content { max-width: 720px; margin: 0 auto; padding: 14px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn .15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ---------- 하단 내비게이션 ---------- */
#bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
#bottom-nav button {
  flex: 1; background: none; border: none; padding: 8px 2px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; color: var(--text-2); cursor: pointer; min-height: 48px;
}
#bottom-nav button .nav-icon { font-size: 18px; }
#bottom-nav button.active { color: var(--accent); }

@media (min-width: 760px) {
  #main-content { padding: 20px 14px 40px; }
}
/* ---------- 셀렉터 바 / 세그먼트 컨트롤 ---------- */
.selector-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.selector-pill {
  background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 14px; font-size: 13px; color: var(--text); cursor: pointer;
  display: flex; align-items: center; gap: 4px; min-height: 40px;
}
.chevron { font-size: 10px; color: var(--text-2); }

.segmented { display: flex; background: var(--surface-2); border-radius: 10px; padding: 3px; gap: 2px; margin-bottom: 8px; }
.seg-btn { flex: 1; border: none; background: none; padding: 9px 4px; border-radius: 8px; font-size: 13px; color: var(--text-2); cursor: pointer; min-height: 40px; }
.seg-btn.active { background: var(--accent); color: var(--accent-text); font-weight: 700; }

.mode-note {
  font-size: 12px; color: var(--text-2); background: var(--surface-2);
  border-radius: 8px; padding: 8px 10px; margin: 0 0 10px; line-height: 1.5;
}
.sample-disclaimer {
  font-size: 12px; color: #92400E; background: #FEF3C7; border: 1px solid #FDE68A;
  border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5;
}
[data-theme="dark"] .sample-disclaimer { color: #FBBF24; background: #3A2E10; border-color: #5C4A16; }

.situation-banner {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 10px; font-size: 13px;
}
.fav-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-2); line-height: 1; flex-shrink: 0; }
.fav-btn.active { color: #F59E0B; }

.sample-pill {
  font-size: 10px; font-family: var(--font-mono); background: var(--act-3bet); color: #1A1200;
  border-radius: 5px; padding: 2px 6px; vertical-align: middle; margin-left: 6px;
}

/* ---------- 범례 ---------- */
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.legend-chip {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2);
  background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px;
}
.legend-swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

/* ---------- 확대/축소 바 ---------- */
.zoom-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
.zoom-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 16px; cursor: pointer;
}
.zoom-label { font-family: var(--font-mono); font-size: 12px; color: var(--text-2); min-width: 40px; text-align: center; }

/* ---------- 공통 카드 / 버튼 / 폼 ---------- */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; margin-bottom: 12px;
}
.card-title { margin: 0 0 10px; font-size: 14px; }
.card label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--text-2); margin-bottom: 10px; }
.card input, .card select {
  font-size: 15px; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); min-height: 42px;
}
.checkbox-row { flex-direction: row !important; align-items: center; gap: 8px !important; }
.checkbox-row input { min-height: auto; width: 18px; height: 18px; }

.btn-primary {
  width: 100%; background: var(--accent); color: var(--accent-text); border: none;
  border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; min-height: 46px;
}
.btn-secondary {
  background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; min-height: 42px; width: 100%;
}
.btn-ghost {
  width: 100%; background: none; border: 1px dashed var(--border); border-radius: 10px;
  padding: 10px; color: var(--text-2); font-size: 13px; cursor: pointer; margin-top: 10px; min-height: 42px;
}
.icon-btn { background: none; border: none; color: var(--text-2); font-size: 14px; cursor: pointer; width: 32px; height: 32px; flex-shrink: 0; }

.empty-state { text-align: center; padding: 30px 16px; color: var(--text-2); }
.empty-state-icon { font-size: 32px; margin-bottom: 10px; }
.empty-state-sub { font-size: 12px; line-height: 1.5; }

.page-header h2 { margin: 4px 0 2px; font-size: 19px; }
.page-sub { color: var(--text-2); font-size: 13px; margin: 0 0 12px; line-height: 1.5; }

.list-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.list-row:last-child { border-bottom: none; }
.list-row-main { flex: 1; text-align: left; background: none; border: none; color: var(--text); font-size: 13px; cursor: pointer; padding: 4px 0; }
.empty-text { color: var(--text-2); font-size: 13px; margin: 4px 0; }

.quick-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.quick-chip {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; font-size: 13px; cursor: pointer; color: var(--text); min-height: 42px;
}
.tip-banner {
  background: linear-gradient(135deg, var(--accent), #8B8FFF); color: #fff; border-radius: 12px;
  padding: 14px; margin-bottom: 14px; font-size: 13px; line-height: 1.55;
}

.advanced-options { margin-top: 4px; margin-bottom: 20px; }
.advanced-options summary {
  cursor: pointer; font-size: 13px; color: var(--text-2); padding: 8px 0; user-select: none;
}
.advanced-options[open] summary { color: var(--text); }
/* ---------- 13x13 핸드 매트릭스 ---------- */
.matrix-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 14px; padding-bottom: 4px; }
.hand-matrix {
  --cell-size: 32px;
  display: grid;
  grid-template-columns: repeat(13, var(--cell-size));
  grid-auto-rows: var(--cell-size);
  gap: 2px;
  width: max-content;
}
.hand-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer; color: #fff; font-family: var(--font-mono);
  font-size: 10px; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,0.10);
  user-select: none;
}
.hand-cell:active { transform: scale(0.93); }
.cell-hand-name { line-height: 1.1; letter-spacing: -0.2px; }
.cell-percent { font-size: 7.5px; font-weight: 600; line-height: 1.1; margin-top: 1px; opacity: .92; }
.hand-matrix.beginner-mode .cell-hand-name { font-size: 12px; }
.hand-matrix.beginner-mode .cell-percent { display: none; }
.cell-pair { border-color: rgba(255,255,255,0.3); border-width: 1.5px; }

/* ---------- 원형 테이블 다이어그램 ---------- */
.table-diagram-wrap { display: flex; justify-content: center; margin-bottom: 6px; }
.table-diagram { width: 100%; max-width: 300px; height: auto; }
.table-felt { fill: var(--surface-2); stroke: var(--border); stroke-width: 2; }
.seat circle:not(.dealer-chip) { fill: var(--surface); stroke: var(--border); stroke-width: 1.5; cursor: pointer; }
.seat text:not(.dealer-chip-label) { font-size: 11px; fill: var(--text); font-family: var(--font-mono); pointer-events: none; font-weight: 600; }
.seat-active circle:not(.dealer-chip) { fill: var(--accent); stroke: var(--accent); }
.seat-active text:not(.dealer-chip-label) { fill: var(--accent-text); font-weight: 700; }
.dealer-chip { fill: #F59E0B; stroke: var(--surface); stroke-width: 1.5; }
.dealer-chip-label { font-size: 8px; fill: #1A1200; font-weight: 700; pointer-events: none; }

/* ---------- 바텀시트 ---------- */
#sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 40;
}
#sheet-overlay.visible { opacity: 1; pointer-events: auto; }
#bottom-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
  background: var(--surface); border-radius: 16px 16px 0 0;
  max-height: 82vh; overflow-y: auto; padding: 10px 16px calc(24px + env(safe-area-inset-bottom));
  transform: translateY(105%); transition: transform .25s ease;
  box-shadow: 0 -8px 30px rgba(0,0,0,.25);
}
#bottom-sheet.visible { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 4px auto 10px; }
.sheet-close {
  position: absolute; top: 10px; right: 14px; background: var(--surface-2); border: none;
  border-radius: 50%; width: 30px; height: 30px; font-size: 14px; color: var(--text-2); cursor: pointer;
}
.sheet-title { margin: 6px 30px 10px 0; font-size: 16px; }
.sheet-desc { font-size: 12px; color: var(--text-2); margin: 10px 0 4px; line-height: 1.5; }
.sheet-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
.sheet-option {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 13px; cursor: pointer; color: var(--text); min-height: 46px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.sheet-option.active { border-color: var(--accent); background: var(--accent); color: var(--accent-text); font-weight: 700; }
.sheet-option.option-nodata, .sheet-option.option-impossible { opacity: .55; }
.nodata-tag { display: block; font-size: 9px; }

/* ---------- 핸드 상세 패널 ---------- */
.detail-panel { padding-top: 6px; }
.detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.detail-header h3 { font-family: var(--font-mono); font-size: 24px; margin: 0; }
.tag { background: var(--surface-2); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--text-2); }
.detail-action-row {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  background: var(--surface-2); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; font-size: 13px;
}
.detail-label { color: var(--text-2); }
.detail-bullets { margin: 0 0 14px; padding-left: 18px; font-size: 13px; line-height: 1.6; color: var(--text); }
.detail-bullets li { margin-bottom: 6px; }
.detail-note label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }
.detail-note textarea {
  width: 100%; min-height: 70px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); padding: 8px; font-size: 13px; margin-bottom: 8px;
  font-family: var(--font-sans); resize: vertical;
}

/* ---------- BB 계산기 결과 ---------- */
.result-card .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; gap: 10px; }
.result-row:last-of-type { border-bottom: none; }
.result-highlight strong { color: var(--accent); font-size: 16px; }
.hint-text { font-size: 11px; color: var(--text-2); margin-top: 8px; line-height: 1.5; }
.error-text { color: #DC2626; font-size: 13px; }

/* ---------- 용어 설명 ---------- */
.glossary-list { display: flex; flex-direction: column; gap: 10px; }
.glossary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.glossary-term { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.glossary-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }

/* ---------- 토스트 ---------- */
#toast {
  position: fixed; left: 50%; bottom: calc(80px + env(safe-area-inset-bottom));
  transform: translate(-50%, 20px);
  background: #1F2430; color: #fff; padding: 10px 18px; border-radius: 999px;
  font-size: 13px; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 60;
  max-width: 85%; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,.3);
}
#toast.visible { opacity: 1; transform: translate(-50%, 0); }

/* ==================================================================
   v2 추가분: "상대 대응" 탭 전용 스타일
   ================================================================== */

/* 액션 색상: 3-bet All-in 전용 (일반 3-bet과 시각적으로 구분) */
:root { --act-3bet-allin: #E11D48; }
[data-theme="dark"] { --act-3bet-allin: #FB3A5D; }

/* 시나리오 선택 필 (다른 필보다 넓게) */
.selector-pill-wide { flex: 1 1 100%; }

/* 콜러 수 선택 행 */
.callers-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.inline-label { font-size: 12px; color: var(--text-2); white-space: nowrap; }
.callers-segmented { flex: 1; margin-bottom: 0; }

/* 테이블 다이어그램 - 선택 불가(액션 순서상 아직 액션 못한) 좌석 흐리게 */
.seat-dim circle:not(.dealer-chip) { opacity: .3; cursor: not-allowed; }
.seat-dim text:not(.dealer-chip-label) { opacity: .35; }

/* 상대대응 핸드 상세 패널: 우선순위 섹션 구조 */
.detail-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
.detail-section:last-of-type { border-bottom: none; }
.detail-section-label { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 4px; }
.detail-section-body { font-size: 13.5px; line-height: 1.6; color: var(--text); }
.detail-section-body ul { margin: 0; padding-left: 18px; }
.detail-section-body li { margin-bottom: 5px; }
.detail-section-highlight { background: var(--surface-2); border-radius: 10px; padding: 10px 12px; border-bottom: none; margin-bottom: 4px; }
.detail-section-highlight .detail-section-body { font-size: 16px; }

/* 내 차트 탭 즐겨찾기/메모 목록의 오픈·대응 구분 태그 */
.tag-small { font-size: 10px; padding: 1px 6px; margin-right: 4px; vertical-align: 1px; }
.icon-btn { background: none; border: none; color: var(--text-2); font-size: 14px; cursor: pointer; padding: 4px 8px; }

</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="topbar-title">🎯 프리플랍 프로</div>
    <div id="situation-strip"></div>
    <button id="darkmode-toggle" data-action="toggle-darkmode" aria-label="다크모드 전환">🌙</button>
  </header>

  <main id="main-content">
    <section id="tab-home" class="tab-panel"></section>
    <section id="tab-open" class="tab-panel"></section>
    <section id="tab-vsaction" class="tab-panel"></section>
    <section id="tab-pushfold" class="tab-panel"></section>
    <section id="tab-bbcalc" class="tab-panel"></section>
    <section id="tab-glossary" class="tab-panel"></section>
    <section id="tab-mychart" class="tab-panel"></section>
  </main>

  <nav id="bottom-nav">
    <button data-action="switch-tab" data-tab="home"><span class="nav-icon">🏠</span><span>홈</span></button>
    <button data-action="switch-tab" data-tab="open"><span class="nav-icon">📂</span><span>오픈차트</span></button>
    <button data-action="switch-tab" data-tab="vsaction"><span class="nav-icon">↩️</span><span>상대대응</span></button>
    <button data-action="switch-tab" data-tab="pushfold"><span class="nav-icon">🚀</span><span>푸시폴드</span></button>
    <button data-action="switch-tab" data-tab="bbcalc"><span class="nav-icon">🧮</span><span>BB계산기</span></button>
    <button data-action="switch-tab" data-tab="glossary"><span class="nav-icon">📖</span><span>용어</span></button>
    <button data-action="switch-tab" data-tab="mychart"><span class="nav-icon">⭐</span><span>내차트</span></button>
  </nav>

  <div id="sheet-overlay"></div>
  <div id="bottom-sheet"></div>
  <div id="toast"></div>
</div>

<script>
/* ============================================================
   1. 상수 및 설정 데이터 (Constants & Config)
   ============================================================ */

const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const RANK_VALUE_MAP = {};
RANKS.forEach((r, i) => { RANK_VALUE_MAP[r] = 14 - i; });

const TABLE_POSITIONS = {
  '10max': ['UTG','UTG+1','UTG+2','MP','LJ','HJ','CO','BTN','SB','BB'],
  '9max':  ['UTG','UTG+1','MP','LJ','HJ','CO','BTN','SB','BB'],
  '8max':  ['UTG','UTG+1','MP','HJ','CO','BTN','SB','BB'],

/* ============================================================
   2. 앱 상태 관리 (State)
   오픈차트(open)와 상대대응(vs)은 서로 다른 조건을 독립적으로 기억한다.
   ============================================================ */
const state = {
  tab: 'home',   // home | open | vsaction | pushfold | bbcalc | glossary | mychart
  darkMode: true,
  pushfoldSubTab: 'push',

  open: {
    tableSize: '9max', position: 'BTN', stack: 20,
    mode: 'gto', icmMode: 'chipEV', matrixZoom: 1,
  },
  vs: {
    tableSize: '9max', heroPosition: 'BTN', stack: 20,
    scenario: 'facingOpen', villainPosition: 'UTG', size: 2.5, callers: 0,
    mode: 'gto', icmMode: 'chipEV', matrixZoom: 1,
  },
};

const STORAGE_KEYS = {
  darkMode: 'pokerChart_darkMode',
  favorites: 'pokerChart_favorites',
  recent: 'pokerChart_recent',
  notes: 'pokerChart_notes',
};

/* ============================================================
   3. 로컬 스토리지 헬퍼
   ============================================================ */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    console.error('localStorage 읽기 오류:', key, e);
    return fallback;
  }
}
function saveJSON(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error('localStorage 저장 오류:', key, e);
  }
}
function loadDarkModePref() {
  const saved = localStorage.getItem(STORAGE_KEYS.darkMode);
  if (saved === 'true') return true;
  if (saved === 'false') return false;
  return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
}
function applyDarkMode() {
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  localStorage.setItem(STORAGE_KEYS.darkMode, String(state.darkMode));
}

/* ------------------------------------------------------------
   상황(조건 조합) 키 / 라벨 - open, vs 각각 별도 함수
   즐겨찾기/최근조회는 kind 필드로 open/vs를 구분해 저장한다.
   ------------------------------------------------------------ */
function getOpenSituationKey() {
  const s = state.open;
  return `open|${s.tableSize}|${s.stack}BB|${s.position}`;
}
function getOpenSituationLabel() {
  const s = state.open;
  return `${TABLE_SIZE_LABELS[s.tableSize]} · ${s.position} · 유효 스택 ${s.stack}BB · 전원 폴드 오픈`;
}
function getOpenSituationSentence() {
  const s = state.open;
  return `${TABLE_SIZE_LABELS[s.tableSize]} 테이블, ${s.position}, 유효 스택 ${s.stack}BB, 앞사람 전원 폴드 상황의 오픈 차트`;
}

function getVsSituationKey() {
  const s = state.vs;
  return `vs|${s.tableSize}|${s.stack}BB|${s.heroPosition}|${s.scenario}|${s.villainPosition || '-'}|${s.size ?? '-'}|${s.callers}`;
}
function getVsSituationLabel() {
  const s = state.vs;
  const parts = [TABLE_SIZE_LABELS[s.tableSize], s.heroPosition, `${s.stack}BB`];
  parts.push(getVsActionPhrase());
  return parts.join(' · ');
}
// "UTG 2.5BB 오픈 대응" / "SB 올인 콜 차트" 형태의 짧은 액션 구절
function getVsActionPhrase() {
  const s = state.vs;
  if (s.scenario === 'unopened') return '전원 폴드 오픈';
  if (!s.villainPosition) return SCENARIO_LABELS[s.scenario] || s.scenario;
  if (s.scenario === 'facingAllIn') return `${s.villainPosition} 올인 콜 차트`;
  if (SCENARIOS_NEEDING_SIZE.includes(s.scenario) && s.size != null) {
    const callerTxt = s.callers > 0 ? ` +콜러${s.callers >= 2 ? '2명+' : '1명'}` : '';
    return `${s.villainPosition} ${s.size}BB 오픈 대응${callerTxt}`;
  }
  return `${s.villainPosition} ${SCENARIO_LABELS[s.scenario] || ''} 대응`;
}

function toggleFavorite(kind) {
  const favs = loadJSON(STORAGE_KEYS.favorites, []);
  const key = kind === 'open' ? getOpenSituationKey() : getVsSituationKey();
  const label = kind === 'open' ? getOpenSituationLabel() : getVsSituationLabel();
  const idx = favs.findIndex(f => f.key === key);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.unshift({ key, label, kind, savedAt: Date.now() });
  saveJSON(STORAGE_KEYS.favorites, favs.slice(0, 50));
  if (kind === 'open') renderOpenChartTab(); else renderVsActionTab();
}
function isFavorite(kind) {
  const favs = loadJSON(STORAGE_KEYS.favorites, []);
  const key = kind === 'open' ? getOpenSituationKey() : getVsSituationKey();
  return favs.some(f => f.key === key);
}
function pushRecent(kind) {
  const recents = loadJSON(STORAGE_KEYS.recent, []);
  const key = kind === 'open' ? getOpenSituationKey() : getVsSituationKey();
  const label = kind === 'open' ? getOpenSituationLabel() : getVsSituationLabel();
  const filtered = recents.filter(r => r.key !== key);
  filtered.unshift({ key, label, kind, viewedAt: Date.now() });
  saveJSON(STORAGE_KEYS.recent, filtered.slice(0, 12));
}

// 즐겨찾기/최근조회 항목 클릭 시 해당 상태로 복원 (key의 kind 접두어로 open/vs 판별)
function restoreFromKey(key) {
  const segs = key.split('|');
  const kind = segs[0];
  if (kind === 'open') {
    const [, tableSize, stackBB, position] = segs;
    state.open.tableSize = tableSize;
    state.open.stack = parseInt(stackBB, 10);
    state.open.position = position;
    state.tab = 'open';
  } else {
    const [, tableSize, stackBB, heroPosition, scenario, villainPosition, size, callers] = segs;
    state.vs.tableSize = tableSize;
    state.vs.stack = parseInt(stackBB, 10);
    state.vs.heroPosition = heroPosition;
    state.vs.scenario = scenario;
    state.vs.villainPosition = villainPosition === '-' ? null : villainPosition;
    state.vs.size = size === '-' ? null : parseFloat(size);
    state.vs.callers = parseInt(callers, 10) || 0;
    state.tab = 'vsaction';
  }
  closeSheet();
  render();
}

function getNoteKey(kind, hand) {
  const situKey = kind === 'open' ? getOpenSituationKey() : getVsSituationKey();
  return `${situKey}|${hand}`;
}
function loadNote(kind, hand) {
  const notes = loadJSON(STORAGE_KEYS.notes, {});
  return notes[getNoteKey(kind, hand)] || '';
}
function saveNote(kind, hand, text) {
  const notes = loadJSON(STORAGE_KEYS.notes, {});
  const key = getNoteKey(kind, hand);
  if (text && text.trim()) notes[key] = text.trim();
  else delete notes[key];
  saveJSON(STORAGE_KEYS.notes, notes);
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}
function escapeAttr(str) {
  return String(str == null ? '' : str).replace(/"/g, '&quot;');
}
/* ============================================================
   4. 전략 데이터 검증 (가변 깊이 구조 대응)
   ============================================================ */
function validateStrategyData() {
  let errorCount = 0, checkedHands = 0;
  function walk(node, path) {
    if (typeof node !== 'object' || node === null) return;
    const values = Object.values(node);
    const isRatioLeaf = values.length > 0 && values.every(v => typeof v === 'number');
    if (isRatioLeaf) {
      checkedHands++;
      const sum = values.reduce((a, b) => a + b, 0);
      if (Math.abs(sum - 1) > 0.01) {
        console.error(`[전략 데이터 검증 실패] ${path.join('/')}: 합계=${sum} (1이어야 함)`);
        errorCount++;
      }
      return;
    }
    for (const key in node) walk(node[key], path.concat(key));
  }
  walk(strategyData, []);
  if (errorCount === 0) {
    console.log(`%c✅ strategyData 검증 통과: 핸드 ${checkedHands}개 전부 비율 합=1`, 'color:#22C55E');
  } else {
    console.error(`❌ strategyData 검증 실패: ${errorCount}건 (위 로그 참고)`);
  }
}

/* ============================================================
   5. 데이터 조회 (가변 깊이 경로) / 포지션 유효성
   ============================================================ */
function callersKeyOf(callers) {
  const n = callers || 0;
  return n >= 2 ? 'callers_2plus' : `callers_${n}`;
}

// params: {tableSize, stack, scenario, heroPosition, villainPosition, size, callers}
function getChartData(params) {
  const stackKey = `${params.stack}BB`;
  let node = strategyData && strategyData[params.tableSize] && strategyData[params.tableSize][stackKey] && strategyData[params.tableSize][stackKey][params.scenario];
  if (!node) return null;
  node = node[`hero_${params.heroPosition}`];
  if (!node) return null;

  if (params.scenario === 'unopened') return node;
  if (!params.villainPosition) return null;
  node = node[`villain_${params.villainPosition}`];
  if (!node) return null;

  if (params.scenario === 'facingAllIn') {
    return node[callersKeyOf(params.callers)] || null;
  }
  if (params.size == null) return null;
  node = node[`size_${params.size}`];
  if (!node) return null;
  return node[callersKeyOf(params.callers)] || null;
}

// villainPosition은 heroPosition보다 액션 순서상 앞선 포지션만 가능
function getValidVillainPositions(tableSize, heroPosition) {
  const positions = TABLE_POSITIONS[tableSize];
  const heroIdx = positions.indexOf(heroPosition);
  if (heroIdx <= 0) return [];
  return positions.slice(0, heroIdx);
}

// 오픈차트: '전원 폴드' 상황에서 BB는 오픈할 차례 자체가 없음
// 상대대응: 앞선 액션이 필요한 시나리오인데 내 앞에 아무도 없으면(UTG 등) 불가능
function isHeroPositionValidForScenario(tableSize, heroPosition, scenario) {
  if (scenario === 'unopened' && heroPosition === 'BB') return false;
  if (SCENARIOS_NEEDING_VILLAIN.includes(scenario)) {
    if (getValidVillainPositions(tableSize, heroPosition).length === 0) return false;
  }
  return true;
}

/* ============================================================
   6. 모드별 표시 변환 (초보 / GTO / 펍 실전)
   ============================================================ */
const AGGRESSIVE_ACTION_KEYS = ['threeBetAllIn', 'threeBet', 'fourBetAllIn', 'fourBet', 'allin', 'raise'];

function getAggroKey(ratios) {
  for (const k of AGGRESSIVE_ACTION_KEYS) if (ratios[k] !== undefined) return k;
  return null;
}
function applyBeginnerMode(ratios) {
  const entries = Object.entries(ratios).sort((a, b) => b[1] - a[1]);
  const [topAction, topRatio] = entries[0];
  if (AGGRESSIVE_ACTION_KEYS.includes(topAction) && topRatio < 0.6) return { fold: 1 };
  return { [topAction]: 1 };
}
function applyExploitMode(ratios) {
  const hasFold = 'fold' in ratios;
  const aggroKey = getAggroKey(ratios);
  if (!hasFold || !aggroKey || ratios[aggroKey] >= 0.999) return ratios;
  const oldAggro = ratios[aggroKey];
  const newAggro = Math.round(oldAggro * 0.6 * 100) / 100;
  return { [aggroKey]: newAggro, fold: Math.round((1 - newAggro) * 100) / 100 };
}
function getDisplayRatios(mode, rawRatios) {
  if (mode === 'beginner') return applyBeginnerMode(rawRatios);
  if (mode === 'exploit') return applyExploitMode(rawRatios);
  return rawRatios;
}

/* ============================================================
   7. 핸드 이름 / 속성
   ============================================================ */
function getHandName(i, j) {
  if (i === j) return RANKS[i] + RANKS[i];
  if (i < j) return RANKS[i] + RANKS[j] + 's';
  return RANKS[j] + RANKS[i] + 'o';
}
function getHandProps(hand) {
  const isPair = hand.length === 2;
  const isSuited = hand.endsWith('s');
  const r1 = hand[0], r2 = hand[1];
  const hasAce = r1 === 'A' || r2 === 'A';
  const wheelCards = ['2', '3', '4', '5'];
  const isWheel = hasAce && !isPair && (wheelCards.includes(r1) || wheelCards.includes(r2));
  const v1 = RANK_VALUE_MAP[r1], v2 = RANK_VALUE_MAP[r2];
  const gap = isPair ? 0 : Math.abs(v1 - v2) - 1;
  const isConnector = !isPair && gap <= 1;
  const broadway = ['A', 'K', 'Q', 'J', 'T'];
  const isBroadway = broadway.includes(r1) && broadway.includes(r2);
  return { isPair, isSuited, hasAce, isWheel, gap, isConnector, isBroadway };
}
function dominantAction(ratios) {
  return Object.entries(ratios).sort((a, b) => b[1] - a[1])[0];
}
function formatActionRatios(ratios) {
  return Object.entries(ratios)
    .filter(([, v]) => v > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([a, r]) => `${ACTION_META[a]?.label || a} ${Math.round(r * 100)}%`)
    .join(' · ');
}
function getHandActionLabelShort(ratios) {
  const [act] = dominantAction(ratios);
  const label = ACTION_META[act]?.label || act;
  const otherCount = Object.keys(ratios).filter(a => a !== act && ratios[a] > 0).length;
  return otherCount > 0 ? `${label} 위주` : label;
}

/* ============================================================
   8. 오픈차트용 핸드 설명 (기존 방식 유지)
   ============================================================ */
function generateOpenHandExplanation(hand, gtoRatios) {
  const props = getHandProps(hand);
  const meta = (typeof handMeta !== 'undefined' && handMeta[hand]) || {};
  const bullets = [];
  if (props.isPair) {
    bullets.push(meta.rank && meta.rank <= 15
      ? '상위권 포켓페어로, 강하게 밀어붙일 수 있는 프리미엄 핸드입니다.'
      : '포켓페어는 셋(트리플)을 맞추면 매우 강력하지만, 못 맞추면 이후 플레이가 까다로워질 수 있습니다.');
  } else {
    bullets.push(props.isSuited
      ? '같은 무늬 핸드라 플러시를 만들 가능성이 있습니다.'
      : '무늬가 달라 플러시 가능성은 없고, 스트레이트나 페어 위주로 승부하는 핸드입니다.');
  }
  if (props.hasAce) bullets.push('에이스를 포함하고 있어 상대의 AK·AQ 등 강한 에이스 조합 확률을 낮추는 블로커 역할을 합니다.');
  if (props.isWheel) bullets.push('A-2-3-4-5 휠 스트레이트 가능성이 있는 조합입니다.');
  if (props.isConnector && !props.isPair) bullets.push('서로 연결된 카드라 스트레이트 가능성이 있습니다.');
  const weakAceOffsuit = props.hasAce && !props.isPair && !props.isSuited && RANK_VALUE_MAP[hand[1]] <= 9;
  if (weakAceOffsuit) bullets.push('약한 에이스-오프수트 조합이라, 상대가 더 좋은 에이스를 가졌을 때 킥커에서 도미네이트될 위험이 있습니다.');
  const dominant = dominantAction(gtoRatios)[0];
  bullets.push(dominant === 'fold'
    ? `${state.open.position} 포지션, 유효 스택 ${state.open.stack}BB 기준으로는 이 핸드로 오픈하기엔 범위 밖입니다.`
    : `${state.open.position} 포지션, 유효 스택 ${state.open.stack}BB 기준 오픈 범위 안에 포함되는 핸드입니다.`);
  bullets.push('상대가 타이트하면 스틸 성공률이 높아 오픈 빈도를 늘릴 수 있고, 콜을 많이 받아주는 루즈한 상대에게는 밸류 위주로 좁히는 것이 좋습니다.');
  bullets.push('버블 등 ICM 상황에서는 상대 스택과 상금 구조에 따라 더 보수적으로 조정될 수 있습니다. 정확한 조정에는 별도 ICM 계산이 필요합니다.');
  return bullets;
}

/* ============================================================
   9. 상대 대응용 핸드 상세 (요청된 우선순위로 재구성)
      1)현재상황 2)추천행동 3)비율 4)상대포지션변화 5)사이즈변화 6)스택변화 7)핸드설명(마지막)
   ============================================================ */
function compareAcrossVillains(hand) {
  const s = state.vs;
  const scope = VS_ACTION_DATA_SCOPE[s.heroPosition] || [];
  const lines = [];
  scope.forEach(vp => {
    if (vp === s.villainPosition) return;
    const data = getChartData({ tableSize: s.tableSize, stack: s.stack, scenario: s.scenario, heroPosition: s.heroPosition, villainPosition: vp, size: s.size, callers: s.callers });
    if (data && data[hand]) {
      const actionTxt = s.scenario === 'facingAllIn' ? '올인' : `${s.size}BB 오픈`;
      lines.push(`<strong>${vp}</strong> ${actionTxt}이면: ${getHandActionLabelShort(data[hand])}`);
    }
  });
  return lines;
}
function compareAcrossSizes(hand) {
  const s = state.vs;
  if (!SCENARIOS_NEEDING_SIZE.includes(s.scenario)) return [];
  const lines = [];
  IMPLEMENTED_SIZES.forEach(sz => {
    if (sz === s.size) return;
    const data = getChartData({ tableSize: s.tableSize, stack: s.stack, scenario: s.scenario, heroPosition: s.heroPosition, villainPosition: s.villainPosition, size: sz, callers: s.callers });
    if (data && data[hand]) lines.push(`상대가 <strong>${sz}BB</strong>로 오픈하면: ${getHandActionLabelShort(data[hand])}`);
  });
  return lines;
}
function compareAcrossStacks(hand) {
  const s = state.vs;
  const lines = [];
  IMPLEMENTED_STACKS.forEach(st => {
    if (st === s.stack) return;
    const data = getChartData({ tableSize: s.tableSize, stack: st, scenario: s.scenario, heroPosition: s.heroPosition, villainPosition: s.villainPosition, size: s.size, callers: s.callers });
    if (data && data[hand]) lines.push(`유효 스택이 <strong>${st}BB</strong>면: ${getHandActionLabelShort(data[hand])}`);
  });
  return lines;
}
function generateVsHandOwnExplanation(hand, villainPos) {
  const props = getHandProps(hand);
  const bullets = [];
  if (props.isPair) {
    bullets.push('포켓페어이며, 셋(트리플)을 맞추면 강력하지만 맞추지 못하면 오버카드에 약할 수 있습니다.');
  } else {
    bullets.push(props.isSuited
      ? '같은 무늬라 플러시 가능성이 있고, 블러프 3벳이나 콜의 보조 가치(백업 에퀴티)를 갖습니다.'
      : '무늬가 달라 콜로 이어갈 경우 스트레이트·페어 위주로 가치를 봐야 합니다.');
  }
  if (props.hasAce) bullets.push('에이스 블로커를 보유해 상대의 AA·AK 등 강한 조합 일부를 차단합니다. 그래서 블러프 3벳 후보로 자주 쓰입니다.');
  if (props.isWheel) bullets.push('A-2-3-4-5 휠 스트레이트 가능성이 있어, 블로커와 약간의 에퀴티를 동시에 갖춘 조합입니다.');
  if (props.isConnector && !props.isPair) bullets.push('연결된 카드라 콜로 이어갈 때 스트레이트 위주의 플레이가 가능합니다.');
  const tightVillain = villainPos === 'UTG' || villainPos === 'HJ';
  const weakBroadwayOffsuit = !props.isPair && !props.isSuited && props.isBroadway;
  if (tightVillain && weakBroadwayOffsuit) {
    bullets.push(`${villainPos}처럼 강한 레인지를 가진 상대에게는 이런 오프수트 브로드웨이가 도미네이트(킥커 열세)될 위험이 커서 콜 가치가 떨어집니다.`);
  }
  return bullets;
}

function buildVsActionDetailSections(hand) {
  const s = state.vs;
  const data = getChartData({ tableSize: s.tableSize, stack: s.stack, scenario: s.scenario, heroPosition: s.heroPosition, villainPosition: s.villainPosition, size: s.size, callers: s.callers });
  const gtoRatios = (data && data[hand]) || { fold: 1 };
  const sections = [];

  sections.push({ label: '현재 상황', body: `${TABLE_SIZE_LABELS[s.tableSize]} · Hero ${s.heroPosition} · ${s.stack}BB · ${getVsActionPhrase()}` });

  const [topAct] = dominantAction(gtoRatios);
  sections.push({ label: '추천 행동', body: `<strong>${ACTION_META[topAct]?.label || topAct}</strong>`, highlight: true });
  sections.push({ label: '행동별 비율 (GTO 모드 기준 · 샘플)', body: formatActionRatios(gtoRatios) });

  const villainLines = compareAcrossVillains(hand);
  if (villainLines.length) sections.push({ label: '상대 포지션이 바뀌면', body: villainLines.join('<br>') });

  const sizeLines = compareAcrossSizes(hand);
  if (sizeLines.length) sections.push({ label: '상대 레이즈 크기가 바뀌면', body: sizeLines.join('<br>') });

  const stackLines = compareAcrossStacks(hand);
  if (stackLines.length) sections.push({ label: '유효 스택이 바뀌면', body: stackLines.join('<br>') });

  const ownBullets = generateVsHandOwnExplanation(hand, s.villainPosition);
  sections.push({ label: '핸드 설명', body: `<ul>${ownBullets.map(b => `<li>${b}</li>`).join('')}</ul>` });

  return sections;
}

/* ============================================================
   12. 원형 홀덤 테이블 다이어그램 (SVG)
   highlightPos: 강조할 단일 포지션(문자열) 또는 강조할 포지션 배열
   dimPositions: 선택 불가능하게 흐리게 표시할 포지션 배열
   ============================================================ */
function buildTableDiagramSVG(tableSize, highlightPos, actionName, dimPositions) {
  const positions = TABLE_POSITIONS[tableSize];
  const highlightSet = new Set(Array.isArray(highlightPos) ? highlightPos : [highlightPos]);
  const dimSet = new Set(dimPositions || []);
  const n = positions.length;
  const cx = 150, cy = 105, rx = 118, ry = 78;
  let seatsHTML = '';
  for (let idx = 0; idx < n; idx++) {
    const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);
    const pos = positions[idx];
    const isBTN = pos === 'BTN' || pos === 'BTN/SB';
    const isActive = highlightSet.has(pos);
    const isDim = dimSet.has(pos) && !isActive;
    seatsHTML += `
      <g class="seat ${isActive ? 'seat-active' : ''} ${isDim ? 'seat-dim' : ''}" data-action="${actionName}" data-value="${pos}">
        <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="21"></circle>
        <text x="${x.toFixed(1)}" y="${(y + 4).toFixed(1)}" text-anchor="middle">${pos}</text>

      </g>`;
  }
  return `<svg viewBox="0 0 300 210" class="table-diagram">
    <ellipse cx="${cx}" cy="${cy}" rx="${rx - 28}" ry="${ry - 28}" class="table-felt"></ellipse>

/* ============================================================
   13. 공용 13x13 매트릭스 렌더러 (오픈차트 / 상대대응 공유)
   ============================================================ */
function renderMatrixGrid(container, chartData, mode, zoom, clickAction) {
  let html = `<div class="hand-matrix ${mode === 'beginner' ? 'beginner-mode' : ''}" style="--cell-size:${Math.round(32 * zoom)}px">`;
  for (let i = 0; i < 13; i++) {
    for (let j = 0; j < 13; j++) {
      const hand = getHandName(i, j);
      const raw = chartData[hand] || { fold: 1 };
      const display = getDisplayRatios(mode, raw);
      html += buildCellHTML(hand, display, i === j, i < j, mode, clickAction);
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function buildCellHTML(hand, ratios, isPair, isSuited, mode, clickAction) {
  const entries = Object.entries(ratios).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  const cellTypeClass = isPair ? 'cell-pair' : (isSuited ? 'cell-suited' : 'cell-offsuit');
  let bgStyle;
  if (entries.length <= 1) {
    const color = entries[0] ? (ACTION_META[entries[0][0]]?.color || '#666') : '#666';
    bgStyle = `background:${color};`;
  } else {
    let stops = [], acc = 0;
    entries.forEach(([act, ratio]) => {
      const color = ACTION_META[act]?.color || '#666';
      const start = (acc * 100).toFixed(1);
      acc += ratio;
      const end = (acc * 100).toFixed(1);
      stops.push(`${color} ${start}% ${end}%`);
    });
    bgStyle = `background:linear-gradient(to right, ${stops.join(',')});`;
  }
  const showPercent = mode === 'gto' && entries.length > 1;
  const percentHTML = showPercent ? `<div class="cell-percent">${entries.map(([, r]) => `${Math.round(r * 100)}%`).join('/')}</div>` : '';
  return `<div class="hand-cell ${cellTypeClass}" style="${bgStyle}" data-action="${clickAction}" data-hand="${hand}">
    <span class="cell-hand-name">${hand}</span>${percentHTML}
  </div>`;
}

function renderLegend(container, chartData, mode) {
  if (!container) return;
  if (!chartData) { container.innerHTML = ''; return; }
  const actionsPresent = new Set();
  Object.values(chartData).forEach(raw => {
    const display = getDisplayRatios(mode, raw);
    Object.keys(display).forEach(a => { if (display[a] > 0) actionsPresent.add(a); });
  });
  let html = '<div class="legend">';
  actionsPresent.forEach(a => {
    const meta = ACTION_META[a];
    if (!meta) return;
    html += `<span class="legend-chip"><span class="legend-swatch" style="background:${meta.color}"></span>${meta.label}</span>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function calcBB() {
  const myChips = parseFloat(document.getElementById('bb-my-chips').value) || 0;
  const oppChips = parseFloat(document.getElementById('bb-opp-chips').value) || 0;
  const sb = parseFloat(document.getElementById('bb-sb').value) || 0;
  const bb = parseFloat(document.getElementById('bb-bb').value) || 0;
  const anteOn = document.getElementById('bb-ante-on').checked;
  const anteAmtInput = document.getElementById('bb-ante-amt').value;
  const anteAmt = anteAmtInput ? (parseFloat(anteAmtInput) || 0) : (anteOn ? bb : 0);
  const nextBB = parseFloat(document.getElementById('bb-next-bb').value) || 0;

  const resultEl = document.getElementById('bb-result');
  if (bb <= 0) {
    resultEl.innerHTML = '<p class="error-text">빅 블라인드 값을 입력해주세요.</p>';
    return;
  }
  const myBB = myChips / bb;
  const oppBB = oppChips / bb;
  const effBB = Math.min(myBB, oppBB);
  const orbitCost = sb + bb + (anteOn ? anteAmt : 0);

  let tier;
  if (effBB >= 40) tier = '딥 스택';
  else if (effBB >= 20) tier = '미드 스택';
  else if (effBB >= 10) tier = '숏 스택';
  else tier = '매우 짧음 (푸시/폴드 구간)';

  let nextLevelHTML = '';
  if (nextBB > 0) {
    const nextMyBB = myChips / nextBB;
    nextLevelHTML = `<div class="result-row"><span>다음 레벨 예상 내 스택</span><strong>${nextMyBB.toFixed(1)}BB</strong></div>`;
  }

  resultEl.innerHTML = `
    <div class="card result-card">
      <div class="result-row"><span>내 스택</span><strong>${myBB.toFixed(1)}BB</strong></div>
      <div class="result-row"><span>상대 스택</span><strong>${oppBB.toFixed(1)}BB</strong></div>
      <div class="result-row result-highlight"><span>유효 스택</span><strong>${effBB.toFixed(1)}BB</strong></div>
      <div class="result-row"><span>현재 한 바퀴 비용</span><strong>${orbitCost.toLocaleString('ko-KR')}</strong></div>
      ${nextLevelHTML}
      <div class="result-row"><span>현재 스택 구간</span><strong>${tier}</strong></div>
      <p class="hint-text">유효 스택은 나와 상대방 중 더 적은 스택입니다. 앤티는 스택 BB 계산에는 포함하지 않고 한 바퀴 비용에만 반영했습니다 (BB 앤티 방식: 앤티를 빅블라인드 자리에서 1회 납부한다고 가정).</p>
    </div>`;
}

/* ============================================================
   23. 이벤트 위임 및 액션 핸들러
   ============================================================ */
function attachGlobalListeners() {
  document.body.addEventListener('click', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el || el.tagName === 'SELECT') return;
    handleAction(el.dataset.action, el.dataset, e);
  });
  document.body.addEventListener('change', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.dataset.action, el.dataset, e, el.value);
  });
  const overlay = document.getElementById('sheet-overlay');
  if (overlay) overlay.addEventListener('click', closeSheet);
}

function handleAction(action, data, e, changeValue) {
  switch (action) {
    case 'switch-tab':
      state.tab = data.tab;
      closeSheet();
      render();
      break;
    case 'toggle-darkmode':
      state.darkMode = !state.darkMode;
      applyDarkMode();
      updateTopbar();
      break;
    case 'close-sheet':
      closeSheet();
      break;
    case 'open-sheet':
      openNamedSheet(data.sheet);
      break;

    /* ---------- 오픈차트 / 상대대응 공용: 인원·스택 ---------- */
    case 'select-table-size': {
      const bucket = data.kind === 'open' ? state.open : state.vs;
      bucket.tableSize = data.value;
      const posList = TABLE_POSITIONS[bucket.tableSize];
      const curPos = data.kind === 'open' ? bucket.position : bucket.heroPosition;
      if (!posList.includes(curPos)) {
        const fallback = posList.length >= 2 ? posList[posList.length - 2] : posList[0];
        if (data.kind === 'open') bucket.position = fallback; else bucket.heroPosition = fallback;
      }
      if (data.kind === 'vs') {
        const validVillains = getValidVillainPositions(bucket.tableSize, bucket.heroPosition);
        if (bucket.villainPosition && !validVillains.includes(bucket.villainPosition)) {
          bucket.villainPosition = validVillains[validVillains.length - 1] || null;
        }
      }
      closeSheet();
      render();
      break;
    }
    case 'select-stack': {
      const bucket = data.kind === 'open' ? state.open : state.vs;
      bucket.stack = parseInt(data.value, 10);
      closeSheet();
      render();
      break;
    }

    /* ---------- 오픈차트 전용 ---------- */
    case 'select-position-open':
      state.open.position = data.value;
      closeSheet();
      render();
      break;
    case 'select-open-mode':
      state.open.mode = data.value;
      render();
      break;
    case 'select-open-icm':
      state.open.icmMode = changeValue;
      render();
      break;

    /* ---------- 상대대응 전용 ---------- */
    case 'select-heroposition-vs': {
      state.vs.heroPosition = data.value;
      const validVillains = getValidVillainPositions(state.vs.tableSize, state.vs.heroPosition);
      if (state.vs.villainPosition && !validVillains.includes(state.vs.villainPosition)) {
        state.vs.villainPosition = validVillains.length ? validVillains[validVillains.length - 1] : null;
      }
      closeSheet();
      render();
      break;
    }
    case 'select-scenario': {
      state.vs.scenario = data.value;
      if (state.vs.scenario !== 'unopened') {
        const validVillains = getValidVillainPositions(state.vs.tableSize, state.vs.heroPosition);
        if (!state.vs.villainPosition || !validVillains.includes(state.vs.villainPosition)) {
          state.vs.villainPosition = validVillains.length ? validVillains[validVillains.length - 1] : null;
        }
      }
      closeSheet();
      render();
      break;
    }
    case 'select-villainposition':
      state.vs.villainPosition = data.value;
      closeSheet();
      render();
      break;
    case 'select-size':
      state.vs.size = parseFloat(data.value);
      closeSheet();
      render();
      break;
    case 'select-callers':
      state.vs.callers = parseInt(data.value, 10);
      render();
      break;
    case 'select-vs-mode':
      state.vs.mode = data.value;
      render();
      break;
    case 'select-vs-icm':
      state.vs.icmMode = changeValue;
      render();
      break;

    /* ---------- 즐겨찾기 / 메모 / 확대축소 (공용, kind로 분기) ---------- */
    case 'toggle-favorite':
      toggleFavorite(data.kind);
      break;
    case 'zoom': {
      const bucket = data.kind === 'open' ? state.open : state.vs;
      const delta = data.dir === 'in' ? 0.15 : -0.15;
      bucket.matrixZoom = Math.max(0.7, Math.min(1.6, Math.round((bucket.matrixZoom + delta) * 100) / 100));
      if (data.kind === 'open') renderOpenChartTab(); else renderVsActionTab();
      break;
    }
    case 'save-note': {
      const textarea = document.getElementById('note-input');
      saveNote(data.kind, data.hand, textarea.value);
      showToast('메모를 저장했습니다.');
      break;
    }

    /* ---------- 핸드 상세 패널 열기 ---------- */
    case 'open-hand-detail':
      openOpenHandDetailSheet(data.hand);
      break;
    case 'vs-hand-detail':
      openVsHandDetailSheet(data.hand);
      break;

    /* ---------- 홈 화면 프리셋 ---------- */
    case 'apply-open-preset':
      state.open.tableSize = data.tablesize;
      state.open.position = data.position;
      state.open.stack = parseInt(data.stack, 10);
      state.tab = 'open';
      render();
      break;
    case 'apply-vs-preset':
      state.vs.tableSize = '9max';
      state.vs.heroPosition = data.heroposition;
      state.vs.stack = parseInt(data.stack, 10);
      state.vs.scenario = data.scenario;
      state.vs.villainPosition = data.villainposition || null;
      state.vs.size = data.size ? parseFloat(data.size) : null;
      state.vs.callers = 0;
      state.tab = 'vsaction';
      render();
      break;

    case 'restore-favorite':
      restoreFromKey(data.key);
      break;
    case 'remove-favorite': {
      const favs = loadJSON(STORAGE_KEYS.favorites, []);
      saveJSON(STORAGE_KEYS.favorites, favs.filter(f => f.key !== data.key));
      renderMyChartTab();
      break;
    }

    case 'select-pushfold-subtab':
      state.pushfoldSubTab = data.value;
      renderPushFoldTab();
      break;
    case 'stub-toast':
      showToast(data.msg || NOT_READY_MSG);
      break;
    case 'stub-select':
      break;
    case 'calc-bb':
      calcBB();
      break;
    default:
      break;
  }
}

/* ============================================================
   24. 초기화
   ============================================================ */
function initApp() {
  validateStrategyData();
  state.darkMode = loadDarkModePref();
  applyDarkMode();
  attachGlobalListeners();
  render();
}

document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
</html>
